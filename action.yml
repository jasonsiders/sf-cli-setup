name: Setup SF CLI
description: Action provides simple and super fast way to install and cache Salesforce CLI
branding:
  icon: 'terminal'
  color: 'blue'
inputs:
  plugins:
    description: "A comma-separated list of plugins to be installed, if not already present"
    required: false
  version:
    description: Version of CLI to be installed
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    - shell: bash
      name: Check version of package in NPM registry
      id: get-npm-version
      run: echo "version=$(npm show @salesforce/cli@${{ inputs.version }} version)" >> $GITHUB_OUTPUT

    - name: Cache CLI
      uses: actions/cache@v4
      id: cache
      with:
        path: ~/sf
        key: sf-cli-${{ steps.get-npm-version.outputs.version }}

    - name: Install CLI
      shell: bash
      id: install-cli
      env:
        CLI_VERSION: ${{ steps.get-npm-version.outputs.version }}
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        npm install --prefix ~/sf @salesforce/cli@$CLI_VERSION --global

    - name: Add binary to PATH
      shell: bash
      run: echo "~/sf/bin" >> $GITHUB_PATH

    - name: Display installed CLI Version
      shell: bash
      run: |
        echo "CLI Installed with version: $(sf --version)"

    - name: Install plugins
      shell: bash 
      run: |
        # Installs the provided list of plugins, if not already installed in the cached sf cli:
        IFS=',' read -ra PLUGINS <<< "${{ inputs.plugins }}"
        for plugin in "${PLUGINS[@]}"; do
          if ! sf plugins --core --json | grep -q "\"name\": \"${plugin}\""; then
            echo "Installing ${plugin}..."
            echo y | sf plugins install "${plugin}" --silent
          else
            echo "${plugin} is already installed"
          fi
        done

